[package]
name = "multi-agent-runtime-gemini"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

description = "Gemini CLI ACP adapter for the multi-agent runtime."

[dependencies]
async-stream = "0.3"
async-trait = "0.1"
chrono.workspace = true
futures-core = "0.3"
log = "0.4"
multi-agent-runtime-core = { path = "../multi-agent-runtime-core" }
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
tokio-stream = { version = "0.1", features = ["sync"] }
uuid.workspace = true

[dev-dependencies]
async-trait = "0.1"
chrono.workspace = true
futures-util = "0.3"
tokio = { workspace = true, features = ["macros", "rt", "time", "fs"] }
uuid.workspace = true
