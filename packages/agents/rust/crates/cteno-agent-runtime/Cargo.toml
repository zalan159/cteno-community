[package]
name = "cteno-agent-runtime"
version = "0.1.0"
edition = "2021"
license = "MIT"

[dependencies]
# core runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
futures-util = "0.3"

# data
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
rusqlite = { version = "0.34", features = ["bundled"] }

# utils
chrono = { version = "0.4", features = ["serde"] }
chrono-tz = "0.10"
dirs = "6"
uuid = { version = "1", features = ["v4"] }
log = "0.4"

# HTTP for LLM
reqwest = { version = "0.12", features = ["json", "stream"] }

# encoding
base64 = "0.22"

# hooks + tool_executors deps (P0 Wave 2.1)
once_cell = "1"
regex = "1"
walkdir = "2"
ignore = "0.4"
globset = "0.4"
tempfile = "3"
image = "0.25"
which = "6"
shellexpand = "3"
mime_guess = "2"
urlencoding = "2"
rand = "0.8"
sha1 = "0.10"
hmac = "0.12"
hex = "0.4"
url = "2"
xcap = "0.8"
enigo = { version = "0.6", default-features = false }
readability = "0.3"
html2md = "0.2"
glob = "0.3"
zip = "2"

# Wave 2.2a: browser/cdp.rs CDP over WebSocket
tokio-tungstenite = { version = "0.24", features = ["native-tls"] }

# Wave 2.2a: runs.rs process group signals (kill_run on Unix)
libc = "0.2"

# Wave 3.2a: MCP (Model Context Protocol) official SDK
rmcp = { version = "0.14", features = ["client", "transport-child-process", "transport-streamable-http-client-reqwest"] }

# internal shared utilities
cteno-community-host = { path = "../../../../core/rust/crates/cteno-community-host" }
cteno-community-core = { path = "../../../../core/rust/crates/cteno-community-core" }

# Wave 3.2b: notification_watcher reads macOS usernoted plist blobs
[target.'cfg(target_os = "macos")'.dependencies]
plist = "1"
