[package]
name = "cteno-agent-stdio"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Cteno agent stdio binary — exposes cteno-agent-runtime over a JSON-lines stdio protocol."

[[bin]]
name = "cteno-agent"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-trait = "0.1"
futures-util = "0.3"
log = "0.4"
env_logger = "0.11"
uuid = { version = "1", features = ["v4"] }
anyhow = "1"
once_cell = "1"
shellexpand = "3"

cteno-agent-runtime = { path = "../cteno-agent-runtime" }

[dev-dependencies]
tempfile = "3"
