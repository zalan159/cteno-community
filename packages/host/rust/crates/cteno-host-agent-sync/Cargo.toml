[package]
name = "cteno-host-agent-sync"
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Cteno Team"]

[lib]
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml_edit = "0.22"
anyhow = "1"
thiserror = "2"
dirs = "6"
tracing = "0.1"

[dev-dependencies]
tempfile = "3"
