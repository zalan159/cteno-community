[package]
name = "cteno-host-runtime"
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Cteno Team"]

[lib]
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "sync", "time", "macros"] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
dirs = "6"
hostname = "0.4"
async-trait = "0.1"
reqwest = { version = "0.12", features = ["json"] }
once_cell = "1"

cteno-host-bridge-localrpc = { path = "../cteno-host-bridge-localrpc" }
cteno-host-rpc-core = { path = "../cteno-host-rpc-core" }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3"
