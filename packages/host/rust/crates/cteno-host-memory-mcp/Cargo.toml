[package]
name = "cteno-host-memory-mcp"
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Cteno Team"]

[lib]
path = "src/lib.rs"

[[bin]]
name = "cteno-memory-mcp"
path = "src/main.rs"

[dependencies]
rmcp = { version = "0.14", features = ["server", "transport-io", "schemars", "macros"] }
tokio = { version = "1", features = ["rt-multi-thread", "io-std", "io-util", "macros", "signal"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "1"
chrono = { version = "0.4", features = ["serde"] }
regex = "1"
lazy_static = "1"
shellexpand = "3"
dirs = "6"
clap = { version = "4", features = ["derive", "env"] }
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "process", "io-util"] }
rmcp = { version = "0.14", features = ["client", "transport-child-process"] }
serde_json = "1"
