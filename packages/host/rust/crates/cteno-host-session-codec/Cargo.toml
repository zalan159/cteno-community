[package]
name = "cteno-host-session-codec"
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Cteno Team"]

[lib]
path = "src/lib.rs"

[dependencies]
aes-gcm = "0.10"
base64 = "0.22"
crypto_box = { version = "0.9", features = ["std"] }
rand = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
xsalsa20poly1305 = "0.9"
