[package]
name = "cteno-host-rpc-core"
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Cteno Team"]

[lib]
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["sync"] }
async-trait = "0.1"
log = "0.4"
