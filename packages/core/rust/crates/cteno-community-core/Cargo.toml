[package]
name = "cteno-community-core"
version = "0.1.0"
edition = "2021"
license = "MIT"

[lib]
name = "cteno_community_core"
path = "src/lib.rs"

[features]
default = []
tauri-commands = ["dep:tauri"]

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
lazy_static = "1.5"
regex = "1"
serde = { version = "1", features = ["derive"] }
shellexpand = "3"
tokio = { version = "1", features = ["sync"] }
tauri = { version = "2", features = [], optional = true }
log = "0.4"
